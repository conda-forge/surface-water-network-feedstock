{% set name = "surface-water-network" %}
{% set version = "1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/surface_water_network-{{ version }}.tar.gz
  sha256: de6f0811e71e08b58a5acebc845718a85a6e6005b05844924ac796336573ebbd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - geopandas >=0.9
    - matplotlib-base
    - packaging
    - pandas >=1.2
    - pyproj >=2.2
    - rtree
    - shapely

test:
  imports:
    - swn
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mwtoews/surface-water-network
  summary: Surface water network
  dev_url: https://github.com/mwtoews/surface-water-network
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mwtoews
